<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Hellen is a browser-based virtual assistant powered by speech recognition and speech synthesis.">
    <title>Hellen | Virtual Assistant</title>
    <link rel="icon" href="img/logo.jpg" type="image/jpeg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app">
        <img src="img/logo.jpg" alt="Hellen assistant logo" id="logo">
        <p>I'm <span id="name">Hellen</span>, your <span id="virtual">Virtual Assistant</span></p>
        <p id="status" aria-live="polite">Tap the button and allow microphone access to start talking.</p>
        <img src="img/voice.gif" alt="Listening animation" id="voice">
        <button id="btn" type="button" aria-label="Start voice assistant">
            <span id="content">Click here to talk to me</span>
        </button>
    </main>
    <script src="script.js"></script>
</body>
</html>
